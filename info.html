<html>

<style>
	html {

	}

		font-family: Inter, "Segoe UI", Roboto, "Helvetica Neue", Arial;

		margin: 0;
		background-color: transparent;
		display: flex;
		flex-direction: column;
		align-items: center;
		justify-content: center;
		cursor: url(./images/cursors/default.svg), default;
		transform: scale(0.8);
	}

	img {
		-webkit-user-drag: none;
		-khtml-user-drag: none;
		-moz-user-drag: none;
		-o-user-drag: none;
		user-drag: none;
	}

	div[container] {
		width: 100%;
		height: 100%;
		display: flex;
		flex-direction: column;
		align-items: center;
		justify-content: center;
		background-color: transparent;
		z-index: 2147483646;
		position: absolute;
	}

	div[main] {
		position: relative;
		min-width: 610px;
		min-height: 500px;
		width: 47.5%;
		height: 70%;

		border-radius: 16px;

		flex-direction: column;
		align-items: center;
		justify-content: center;
	}

		width: 156px;
		height: 156px;
	}

	p {
		margin: 0;
	}

	p[title] {
		font-size: 21px;
		margin-top: 5px;
	}

	p[subtitle] {
		margin-top: 0.1px;
		opacity: 0.5;
		font-size: 14px;
	}

	p[description] {
		width: 75%;
		margin-top: 30px;
		font-size: 16px;
		text-align: center;
		margin-bottom: 30px;
	}

	p[license] {
		opacity: 0.375;
		font-size: 10px;
		margin-top: 12.5px;
	}

	hr {
		border: none;
		width: 100%;
		height: 1px;
		background: #a8a8a8ac;
	}

	a[link] {
		text-decoration: none;
		cursor: pointer;
	}

	div[bottom-content] {
		height: auto;
		width: 100%;
		position: absolute;
		right: 0;
		bottom: 0;
	}

	div[inner-content] {
		display: flex;
		flex-direction: row-reverse;
	}

	widget-button {
		margin-top: 0;
		margin-right: 15px;
		margin-bottom: 10px;
	}
</style>

<div container>
	<div main>

            <p title>Welcome to MacOS Web</p>
