<!DOCTYPE html>
<html lang="zh">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>About this mac</title>

	<style>
		html {
			cursor: url(./images/cursors/default.svg), default;
		}

		body {
			margin: 0;
			height: 100vh;
			display: flex;
			justify-content: center;
			font-family: sans-serif;
			cursor: url(./images/cursors/default.svg), default;
			transform: scale(0.6);
			transform-origin: top center;
			user-select: none;
			overflow: hidden;
		}

		img {
			-webkit-user-drag: none;
		}

		.card {
			width: 500px;
			height: 180px;
			border-radius: 16px;
			text-align: center;
			font-size: 20px;
			color: #000;
		}

		.row {
			display: flex;
			justify-content: center;
			gap: 20px;
			margin: 4px 0;
		}

		.label {
			width: 140px;
			text-align: right;
		}

		.value {
			width: 200px;
			text-align: left;
		}

		.more-info {
			background-color: #a8a8a8ac;
			height: 25px;
			width: 100px;
			transform: scale(1.2);
			border: none;
			border-radius: 6px;
			cursor: url(https://cdn.jsdelivr.net/gh/mengobs/Webintosh-Desktop/assets/cursors/pointer.svg), default;
		}
	</style>
</head>

<body>
	<div class="card">
		<img style="height: 200px; width: auto;" src="https://i.postimg.cc/4NSbhrfN/IMG-0324.png" alt="Mac mini" /><br>
  <b>Mac Mini</b><br>
  <small>2024</small><br><br>

  <div class="row">
    <span class="label">Processor</span>
    <span class="value">Apple M4 Pro</span>
  </div>

  <div class="row">
    <span class="label">Memory</span>
    <span class="value">64 GB</span>
  </div>

  <div class="row">
    <span class="label">Startup disk</span>
    <span class="value">Macintosh HD</span>
  </div>

  <div class="row">
    <span class="label">Serial number</span>
    <span class="value">MACINTOSH800</span>
  </div>

  <div class="row">
    <span class="label">macOS</span>
    <span class="value">Sequoia 15.7</span>
  </div>
  <br>
  <button class="more-info">More info...</button><br><br>
  <u style="color: #666; cursor: url(https://cdn.jsdelivr.net/gh/mengobs/Webintosh-Desktop/assets/cursors/pointer.svg), default;">
    <small>Regulation Certification</small>
  </u><br>
  <small style="color: #666;">™ and © 1983-2024 Apple Inc.<br>All rights Reserved.</small>
</div>

<script>
  document.addEventListener('contextmenu', e => e.preventDefault());
</script>

</html>
